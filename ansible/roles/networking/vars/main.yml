---
# Derived facts for networking role
networking_ingress_iface: "{{ ingress_iface if ingress_iface is string else ingress_iface[0] }}"

# Auto-derive multicast route prefix from mc_scope if not set
networking_mc_route_prefix: >-
  {{ mc_route_prefix if mc_route_prefix | length > 0 else
  ('ff02::/16' if mc_scope == 'link' else
  'ff05::/16' if mc_scope == 'site' else
  'ff08::/16' if mc_scope == 'org' else
  'ff0e::/16') }}
